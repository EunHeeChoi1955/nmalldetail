<script>

 
    var arrowBtn         = $('.arrowBtn');    // 화살표 버튼
    var noticeText       = $('.noticeText');  // noticeText    
    var picBtn           = $('.picBtn');      // 사진첨부하기버튼    
    var bottomTextBox    = $('.bottomTextBox');      // 버튼 밑 텍스트 10MB 이하의 png....~   
    var galleryBox       = $('.galleryBox');      // galleryBox 사진들   

  
   
    // 화살표 버튼 누르면 밑에 notice텍스트 토글
    arrowBtn.each(function (idx) {                   
        $(this).on({
            click: function () {
                noticeText.toggleClass('clickBtn'); //보여줌 
                arrowBtn.toggleClass('clickBtn'); //보여줌 
            }
            
        });
    });
    
    //사진첨부하기버튼 누르면 사진추가상자 나타남
    picBtn.each(function (idx) {                   
        $(this).on({
            click: function () {
                picBtn.addClass('addPic');      // 버튼사라짐
                bottomTextBox.addClass('addPic'); //사라짐
                galleryBox.addClass('picBtn'); //보여줌 
            }
            
        });
    });
    
   
    
    </script>



<script>


    
            //   탭버튼 이벤트
            var t=0;
              
              priceBox       = $('#wrap1> #main>#section1 .priceBox');


              $('.tabBtn').on({
                 click:	function(){
                    showHideList();
                 }
              });
              
              
              $(".tab > li > a").click(function(e) {
              e.preventDefault();	
              priceBox.removeClass('addClose'); // 탭버튼 누르면 priceBox 다시나타남
              // 전역변수 조정
              showHideList();
              
              //새로운 클릭일 경우에만 ui 변경
              if(!$(this).parent().hasClass('active')) { 
                $('.tabBtn').text($(this).text()); //보여지는 제목 바꾸기
              }
              
              // 액티브 조정 
              $(this).parent().siblings().removeClass('active').end().addClass('active');
              
              });
              
              //모바일 & PC 공통 
              $(".tabs a").click(function(e) {
                 e.preventDefault();	
                 $(this).parent().siblings().removeClass('active').end().addClass('active');
                 
              //	$(this).parents('ul').next().children().hide().eq($(this).parent().index()).show();
                 $('.tab').parents('ul').next().children().hide().eq($(this).parent().index()).show();
              });
              
              //현재 active 되어있는 탭 외의 모든 데이터 접기 => 모바일도 적용하기 위해선 공통 class 생성하여 적용 필요
              $('.ServiceTab > li').on('click', function(e){
                 e.preventDefault();	
              // $(".nav").navgoco('toggle', false);
                 $(".nav > li").removeClass('active');
                 $(".nav > li").removeClass('open');
              });
              
              function showHideList() {
                 if(t==0){
                    t=1;
                    $('.tab').stop().slideDown();
                    $('.tabBtn').addClass('addFamily');
                 }else{
                    t=0;
                    $('.tab').hide();
                    $('.tabBtn').removeClass('addFamily');	
                    $('.tabBtn').children().stop().slideUp();	
                 }
              }
              



</script>
