<script>

    //헤더영역 스크롤 이벤트 (페럴럭스)
    var $window  = $(window);
    var $header  = $('#wrap1 #header .container');
    var $topWrap = $('#wrap1 #main> #section1>.container>.gap>.topWrap');
    var $toph2   = $('#wrap1 #main> #section1>.container>.gap>.topWrap h2');
    var $gaptop   = $('#wrap1 #main> #section1>.container>.gap');
    var $backBtn = $('#wrap1 #main> #section1>.container>.gap>.topWrap .inputWrap .inputBox .backBtn');
    
    var t = 0; // false === 0 같다는 표시   toggle
    

    
    //마우스로 스크롤값이 아래로 30픽셀이상 >= 내려가면 
    //선택자 헤더영역(#header)에 효과 이벤트가 발생하게 하라 
    $window.scroll(function(){ //스크롤 이벤트
        // console.log(  $window.scrollTop() ); //스크롤 탑값 확인
        if( $window.scrollTop() >= 30 ){  //마우스로 스크롤값이 아래로 30픽셀이상 내려가면
            $header.addClass('addTop');  //헤더에 클래스 추가
            $topWrap.addClass('addTop'); 
            $toph2.addClass('addTop'); 
            $gaptop.addClass('addTop'); 
            $backBtn.addClass('addTop');  
 
        }
        else{
                $header.removeClass('addTop'); //추가된 클래스 삭제
                $topWrap.removeClass('addTop'); 
                $toph2.removeClass('addTop'); 
                $gaptop.removeClass('addTop'); 
                $backBtn.removeClass('addTop'); 
          
        }           
    });




   
    
</script>

<script>
    var focusInput  = $('.focusWrap');
    var inputTxtBox = $('.inputTxtBox');
    var searchIcon  = $('.searchIcon');
    var dropDown    = $('.box-dropDown');
    var xbtn        = $('.xbtn');

  

   

    inputTxtBox.each(function(idx) {                   
        $(this).on({
            click: function () {
                focusInput.eq(idx).toggleClass('addInput'); //빨간새 돋보기 보여줌 
                searchIcon.eq(idx).toggleClass('addhide'); //회색 돋보기 안보여줌 
                dropDown.eq(idx).toggleClass('addshow'); //드롭다운리스트 감춤
                
            }
            
        });
     });

     xbtn.each(function(idx) {                   
        $(this).on({
            click: function () {
                focusInput.eq(idx).toggleClass('addInput'); //빨간새 돋보기 보여줌 
                dropDown.eq(idx).removeClass('addshow'); // 드롭다운리스트 감춤 
              
                
            }
            
        });
     });



    var btn    = document.querySelector('input');

        btn.addEventListener('click', updateBtn);


        function updateBtn() {
            if (btn.value === '비') {
                btn.value = '';
              
            
            } else {
                btn.value = '비';
                
            }
        } 



</script>
