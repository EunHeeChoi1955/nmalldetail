<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="publisher" content="eunheeChoi">
    <title>장바구니 첫진입화면</title>
    <!-- favicon -->
    <link rel="icon" href="./img/favicon/favicon-32.png" sizes="32x32">
   
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/fonts.css">
    <link rel="stylesheet" href="./css/review.css">
    
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/xeicon@2.3.3/xeicon.min.css">

    <!-- jQuery 오픈소스 -->
    <script src="./js/lib/jquery.min.js"></script> 
	<script src='./js/lib/jquery-1.12.4.min.js'></script>
	<!-- <script src='./js/lib/jquery.mobile-1.4.5.min.js'></script>터치이벤트 웹앱 -->
	<script src='./js/lib/jquery.easing.1.3.js'></script>
	<script src='./js/lib/jquery.touchSwipe.min.js'></script>
	<!-- <script src='./js/lib/slick.min.js'></script> -->

    <!-- 리액트 웹개발 오픈소스 -->    
    <script src="./js/lib/react.development.js"></script>
    <script src="./js/lib/react-dom.development.js"></script>
    <script src="./js/lib/babel.min.js"></script>

</head>
<body>
   
<div id="wrap1">
    
    <header id="header"  class="header">
        <div class="container ">

            <ul class="top clearfix">

                <li class="left">
                    
                </li>
                <li class="medium">
                    리뷰작성
                </li>
                <li class="right">
                    <aside id="aside" class="clearfix">
                        <div class="icon-box-gap">
                            <div class="icon-box">
                                <ul class="clearfix ">
                                    <li >
                                       <a href='javascript:Function();'><img src="./img/review_btn_x.svg" alt=""></a> 
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </aside>
                </li>
            </ul>
            

           
        </div>
    </header>
    <main id="main">
        <section id ="section1">
            <div class="container">
                <div class="gap">
                    <div class="wrap">
                        <ul>                        
                            <li>                                
                                <div class="textWrap">
                                    <div class="left">
                                        <a href="javascript:Function();">
                                            <img src="./img/cart_th2.png" alt="">
                                        </a>
                                    </div>
                                     <div class="right">
                                        <div class="txt1">[ROYALMINSTER] 2021년형 로얄민스터 
                                            프리미엄 무선청소기 S10</div>
                                        <div class="txt2">
                                            옵션옵션옵션
                                        </div>
                                    </div>
                                </div>
                            </li>
                        </ul>
                       <div class="reviewWrap">
                           <div class="reviewCon">                               
                                   <div class="top">
                                        <h2>상품은 어떠셨나요?</h2>
                                        <ul class="star_list">
                                            
                                            <li><span class="rating"></span><img src="./img/bg_rating_star.svg"></li>
                                        
                                            <li><span class="rating" ></span><img src="./img/bg_rating_star.svg"></li>
                                        
                                            <li><span class="rating" style="width:50%;"></span><img src="./img/bg_rating_star.svg"></li>
                                        
                                            <li><span class="rating" style="width:0%;"></span><img src="./img/bg_rating_star.svg"></li>
                                        
                                            <li><span class="rating" style="width:0%;"></span><img src="./img/bg_rating_star.svg"></li>
                                            
                                        </ul>
                                        <p class="hid">별점을 선택해 주세요.</p>
                                        <p class="blue "><strong>4.5점!</strong> 훌륭해요</p>
                                   </div>
                                   <div class="bottom">
                                      <h2>후기를 작성해 주세요</h2>
                                      <textarea 
                                      placeholder=
                                      "후기는 최소 10자 이상 입력해 주세요.&#13;&#10;포토는 최대 10장까지, 동영상은 N개 등록 가능합니다. 
                                      &#13;&#10;상품과 무관하거나 스팸, 불법적인 내용의 후기는 &#13;&#10;통보없이 비노출 처리될 수 있습니다."></textarea>
                                      
                                      <div class="picBtn "><a href="#"><span><img src="./img/ico_rw_add_photo.svg" alt=""></span>사진 첨부하기</a></div>
                                      
                                      <div class="bottomTextBox ">
                                          <div>*</div>
                                          <div>&nbsp;사진은 10MB 이하의 PNG,JPG, GIF 파일로 최대 5개까지만 등록가능합니다.</div>
                                      </div>

                                      <div class="galleryBox">
                                        <ul>
                                            <li><img src="./img/img_add.svg" alt=""></li>
                                            <li>
                                                <img src="./img/galleryboximg.png" alt="">
                                                <em><img src="./img/ico_rw_del.svg" alt=""></em>
                                            </li>
                                        </ul>
                                    </div>
                                   </div>
                                   <div class="notice">
                                        <div class="noticeWrap">                                            
                                            <div class="text">리뷰 유의사항</div>
                                            <div class="arrowBtn clickBtn"><a href="#"><span></span></a></div>
                                            
                                        </div>
                                        <div class="noticeText ">
                                            <div class="noticeTextWrap">
                                                <p>
                                                    ‘해당 상품 자체’와 관계없는 글, 양도, 광고성, 욕설, 비방, 도배 등의 글은 <span>예고 없이 이동, 노출 제한, 삭제 등의 조치</span>가 취해질 수 있습니다.
                                                </p>
                                            </div>
                                        </div>
                                    </div>


                            </div>
                        </div>
                      

                       


                    </div>
                </div>   
            </div>
       

                     

            <div class="btnBoxWrap1 ">
                
                <ul class="btnBox">
                    <li class="addBtn"><a href="javascript:Function();" class="cancle">취소</a></li>
                    <li class="addBtn"><a href="javascript:Function();" class="enroll">등록</a></li>
                </ul>
            
            </div>


         
       



        </section>
     
  
  
    </main>

 
 
</div>


<script>

 
    var arrowBtn         = $('.arrowBtn');    // 화살표 버튼
    var noticeText       = $('.noticeText');  // noticeText    
    var picBtn           = $('.picBtn');      // 사진첨부하기버튼    
    var bottomTextBox    = $('.bottomTextBox');      // 버튼 밑 텍스트 10MB 이하의 png....~   
    var galleryBox       = $('.galleryBox');      // galleryBox 사진들   

  
   
    // 화살표 버튼 누르면 밑에 notice텍스트 토글
    arrowBtn.each(function (idx) {                   
        $(this).on({
            click: function () {
                noticeText.toggleClass('clickBtn'); //보여줌 
                arrowBtn.toggleClass('clickBtn'); //보여줌 
            }
            
        });
    });
    
    //사진첨부하기버튼 누르면 사진추가상자 나타남
    picBtn.each(function (idx) {                   
        $(this).on({
            click: function () {
                picBtn.addClass('addPic');      // 버튼사라짐
                bottomTextBox.addClass('addPic'); //사라짐
                galleryBox.addClass('picBtn'); //보여줌 
            }
            
        });
    });
    
   
    
    </script>
</body>
</html>
